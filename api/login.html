<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin — Candy Varela</title>
<link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@700;800&family=Nunito:wght@600;700;800&display=swap" rel="stylesheet">
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  body {
    font-family: 'Nunito', sans-serif;
    min-height: 100vh;
    background: linear-gradient(135deg, #0d2147 0%, #1a3a6e 60%, #75aadb 100%);
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 20px;
  }
  .card {
    background: #fff;
    border-radius: 24px;
    padding: 44px 40px;
    width: 100%;
    max-width: 400px;
    box-shadow: 0 20px 60px rgba(0,0,0,0.25);
  }
  .logo {
    font-family: 'Baloo 2', cursive;
    font-size: 1.6rem;
    font-weight: 800;
    color: #0d2147;
    text-align: center;
    margin-bottom: 6px;
  }
  .logo span { color: #e91e8c; }
  .subtitle {
    text-align: center;
    color: #888;
    font-size: 0.85rem;
    font-weight: 700;
    margin-bottom: 32px;
  }
  label {
    display: block;
    font-size: 0.82rem;
    font-weight: 800;
    color: #1a3a6e;
    margin-bottom: 6px;
    margin-top: 18px;
  }
  input {
    width: 100%;
    border: 2px solid #e8e8f0;
    border-radius: 12px;
    padding: 12px 16px;
    font-family: 'Nunito', sans-serif;
    font-size: 0.95rem;
    font-weight: 600;
    color: #1a1a2e;
    outline: none;
    transition: border-color 0.2s;
  }
  input:focus { border-color: #1a3a6e; }
  .btn-login {
    width: 100%;
    margin-top: 28px;
    background: linear-gradient(135deg, #0d2147, #1a3a6e);
    color: #fff;
    border: none;
    border-radius: 12px;
    padding: 14px;
    font-family: 'Baloo 2', cursive;
    font-weight: 800;
    font-size: 1rem;
    cursor: pointer;
    transition: opacity 0.2s, transform 0.15s;
  }
  .btn-login:hover { opacity: 0.9; transform: translateY(-1px); }
  .btn-login:disabled { opacity: 0.6; cursor: not-allowed; transform: none; }
  .error-msg {
    margin-top: 14px;
    background: #ffe4e4;
    color: #c0392b;
    border-radius: 10px;
    padding: 10px 14px;
    font-size: 0.83rem;
    font-weight: 700;
    text-align: center;
    display: none;
  }
  .back-link {
    display: block;
    text-align: center;
    margin-top: 20px;
    color: #888;
    font-size: 0.82rem;
    font-weight: 700;
    text-decoration: none;
    transition: color 0.2s;
  }
  .back-link:hover { color: #1a3a6e; }
</style>
</head>
<body>
<div class="card">
  <div class="logo">🇦🇷 Candy <span>Varela</span> ⭐⭐⭐</div>
  <div class="subtitle">Panel de administración</div>

  <label>Usuario</label>
  <input type="text" id="usuario" placeholder="Tu usuario admin" autocomplete="username">

  <label>Contraseña</label>
  <input type="password" id="password" placeholder="••••••••" autocomplete="current-password">

  <button class="btn-login" id="btnLogin" onclick="doLogin()">Ingresar al panel</button>
  <div class="error-msg" id="errorMsg">Usuario o contraseña incorrectos</div>

  <a href="index.html" class="back-link">← Volver al catálogo</a>
</div>

<script>
  if (sessionStorage.getItem('candy_admin_token')) {
    window.location.href = 'admin.html';
  }

  async function doLogin() {
    const btn = document.getElementById('btnLogin');
    const err = document.getElementById('errorMsg');
    const usuario = document.getElementById('usuario').value.trim();
    const password = document.getElementById('password').value;

    if (!usuario || !password) return;

    btn.disabled = true;
    btn.textContent = 'Verificando...';
    err.style.display = 'none';

    try {
      const res = await fetch('/api/login', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ usuario, password })
      });
      const data = await res.json();

      if (data.ok) {
        sessionStorage.setItem('candy_admin_token', data.token);
        window.location.href = 'admin.html';
      } else {
        err.style.display = 'block';
        btn.disabled = false;
        btn.textContent = 'Ingresar al panel';
      }
    } catch (e) {
      err.textContent = 'Error de conexión. Intentá de nuevo.';
      err.style.display = 'block';
      btn.disabled = false;
      btn.textContent = 'Ingresar al panel';
    }
  }

  document.addEventListener('keydown', e => {
    if (e.key === 'Enter') doLogin();
  });
</script>
</body>
</html>
